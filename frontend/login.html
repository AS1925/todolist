<!DOCTYPE html>
<html>
<head>
  <title>Login - Sakthi Todo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      color: #667eea;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .signup-link {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .signup-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: bold;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }

    .error {
      color: #e74c3c;
      background: #fadbd8;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .success {
      color: #27ae60;
      background: #d5f4e6;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>✨ Sakthi Todo</h1>
    <p>Organize your tasks, achieve your goals</p>
  </div>

  <div id="errorMsg" class="error"></div>
  <div id="successMsg" class="success"></div>

  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="Enter your email" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Enter your password" required>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">Login</button>
  </form>

  <div class="signup-link">
    New to Jayam Todo? <a href="signup.html">Create an account</a>
  </div>
</div>

<script>
async function handleLogin(event) {
  event.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");
  const loginBtn = document.getElementById("loginBtn");

  // Clear previous messages
  errorMsg.style.display = "none";
  successMsg.style.display = "none";

  // Validate inputs
  if (!email || !password) {
    showError("Please fill in all fields");
    return;
  }

  // Disable button during login
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="loading"></span> Logging in...';

  try {
    const res = await fetch("http://localhost:5000/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (res.status === 200 && data.message === "Login success") {
      // Store user data in localStorage
      localStorage.setItem("userId", data.userId);
      localStorage.setItem("username", data.username);
      localStorage.setItem("email", data.email);
      localStorage.setItem("createdAt", data.createdAt);
      localStorage.setItem("loginStreak", data.loginStreak);

      showSuccess("Login successful! Redirecting...");
      
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1500);
    } else {
      showError(data.message || "Invalid login credentials");
      loginBtn.disabled = false;
      loginBtn.innerHTML = "Login";
    }
  } catch (error) {
    console.error("Login error:", error);
    showError("Connection error. Please try again.");
    loginBtn.disabled = false;
    loginBtn.innerHTML = "Login";
  }
}

function showError(message) {
  const errorMsg = document.getElementById("errorMsg");
  errorMsg.innerText = message;
  errorMsg.style.display = "block";
}

function showSuccess(message) {
  const successMsg = document.getElementById("successMsg");
  successMsg.innerText = message;
  successMsg.style.display = "block";
}
</script>

</body>
</html>
